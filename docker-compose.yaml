version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: studybuddy_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    
  frontend:
    build: 
      context: ./frontend
    container_name: studybuddy_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: always
